<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0a0a0a"/>
  <g transform="translate(250, 150)">
    <polygon points="0,0 300,0 300,200 100,300 0,300" fill="#1e1e1e" stroke="#333" stroke-width="2"/>
    <circle cx="120" cy="120" r="60" fill="#333" />
    <circle cx="120" cy="120" r="40" fill="#0a0a0a" />
    <polygon points="300,200 100,300 300,300" fill="rgba(0,0,0,0.8)" transform="translate(-10, -10)" filter="blur(10px)"/>
    <polygon points="300,200 100,300 300,300" fill="url(#rainbow)"/>
